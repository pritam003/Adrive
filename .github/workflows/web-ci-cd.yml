name: Web CI/CD

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'webversion/**'
      - '.github/workflows/web-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'webversion/**'
      - '.github/workflows/web-ci-cd.yml'

permissions:
  contents: write

defaults:
  run:
    working-directory: webversion

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Build & Test  (activate when web app is bootstrapped)
  # ─────────────────────────────────────────────
  build:
    name: Build & Test Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webversion/package-lock.json

      # ── uncomment once package.json is added ──
      # - name: Install dependencies
      #   run: npm ci

      # - name: Run tests
      #   run: npm test

      # - name: Build production bundle
      #   run: npm run build

      # - name: Upload build artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: adrive-web-${{ github.run_number }}
      #     path: webversion/dist/
      #     retention-days: 14

      - name: Placeholder — web app not yet bootstrapped
        run: echo "Web version CI/CD ready. Add package.json and uncomment the steps above."

  # ─────────────────────────────────────────────
  # JOB 2 – Deploy  (activate when hosting target is set)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Add deployment steps here (e.g. Vercel, Azure Static Web Apps, etc.) ──
      - name: Placeholder — configure deployment target
        run: echo "Configure your web deployment target (Vercel / Azure / Netlify etc.) here."

