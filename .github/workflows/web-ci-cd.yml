name: Web — Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'webversion/**'
      - '.github/workflows/web-ci-cd.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'webversion/**'
      - '.github/workflows/web-ci-cd.yml'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Build & Deploy (open PRs + pushes)
  # ─────────────────────────────────────────────
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Web

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # With monorepo layout the app root is the webversion/ folder
          app_location: "webversion"
          api_location: "webversion/api"
          output_location: "dist"

  # ─────────────────────────────────────────────
  # JOB 2 – Close PR preview environment
  # ─────────────────────────────────────────────
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview

    steps:
      - name: Close Pull Request in Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
