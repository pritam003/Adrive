name: Android CI/CD

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 – Build & Test
  # ─────────────────────────────────────────────
  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Run unit tests
        run: ./gradlew test

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adrive-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 2 – Lint
  # ─────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lint

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  # ─────────────────────────────────────────────
  # JOB 3 – Release Build (main branch only)
  # ─────────────────────────────────────────────
  release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean project (remove stale build artifacts)
        run: ./gradlew clean

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: adrive-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Optional: create a GitHub Release tag ──────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Adrive v1.0.${{ github.run_number }}"
          body: |
            🚀 Auto-release from CI/CD pipeline

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Build:** #${{ github.run_number }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

